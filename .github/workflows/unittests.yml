name: dbt CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  dbt-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. Install dependencies
      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install dbt-postgres

      # 4. Show dbt version (debug step)
      - name: dbt version
        run: dbt --version

      # 5. Install dbt dependencies (if you use packages.yml)
      - name: dbt deps
        working-directory: medical_warehouse
        run: dbt deps || echo "No dependencies found"

      # 6. dbt debug (checks connection)
      - name: dbt debug
        working-directory: medical_warehouse
        run: dbt debug

      # 7. dbt run (build models)
      - name: dbt run
        working-directory: medical_warehouse
        run: dbt run

      # 8. dbt test (data quality checks)
      - name: dbt test
        working-directory: medical_warehouse
        run: dbt test