version: 2

models:

  - name: dim_channels
    description: "Channel dimension table with aggregated channel statistics."

    columns:
      - name: channel_key
        tests:
          - unique
          - not_null

      - name: channel_name
        tests:
          - not_null

  - name: dim_dates
    description: "Date dimension table with calendar attributes."

    columns:
      - name: date_key
        tests:
          - unique
          - not_null

  - name: fct_messages
    description: "Fact table containing Telegram messages."

    columns:
      - name: message_id
        tests:
          - unique
          - not_null

      - name: channel_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_channels')
              field: channel_key

      - name: date_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_dates')
              field: date_key

      - name: views
        tests:
          - not_null

  - name: fct_image_detections
    description: "YOLO detection results."

    columns:
      - name: message_id

      - name: channel_key

      - name: date_key

      - name: detected_class

      - name: confidence_score

      - name: image_category